name: Deploy Jelajah Nusantara

on:
  push:
    branches:
      - main  # Ganti ke 'master' jika branch utama kalian namanya master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Deploy via SSH to VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_IP }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        script: |
          # 1. Masuk ke folder html-proyek
          cd /var/www/html-proyek

          # 2. Jika folder proyek belum terhubung dengan git, kita amankan kodenya
          if [ ! -d "jelajah_nusantara/.git" ]; then
            sudo rm -rf jelajah_nusantara
            sudo git clone https://github.com/${{ github.repository }}.git jelajah_nusantara
            cd jelajah_nusantara
          else
            cd jelajah_nusantara
            sudo git fetch --all
            sudo git reset --hard origin/main  # Menimpa file lokal dengan kode terbaru dari GitHub
          fi

          # 3. Berikan hak akses ke Nginx agar file PHP bisa dibaca dan gambar bisa diunggah
          sudo chown -r www-data:www-data /var/www/html-proyek/jelajah_nusantara
          sudo chmod -r 755 /var/www/html-proyek/jelajah_nusantara

          # 4. Amankan dan segarkan server Nginx
          sudo systemctl restart nginx
